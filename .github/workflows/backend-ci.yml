name: Backend CI

on:
  pull_request:
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: Backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
